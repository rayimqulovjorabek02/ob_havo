<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ob-havo malumotlari</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="weather-app">
            <h1><i class="fas fa-cloud-sun"></i> Ob-havo malumotlari</h1>
            
            <!-- Qidiruv paneli -->
            <div class="search-container">
                <input type="text" id="cityInput" placeholder="Shahar nomini kiriting..." />
                <button id="searchBtn"><i class="fas fa-search"></i> Qidirish</button>
                <button id="locationBtn"><i class="fas fa-location-arrow"></i> Joylashuvim</button>
            </div>

            <!-- SEARCH CONTAINER OLDINGI KODDAN KEYIN -->
        <div class="forecast-tabs">
                <button class="tab-btn active" data-range="daily">Kunlik</button>
                <button class="tab-btn" data-range="7days">7 kunlik</button>
                <button class="tab-btn" data-range="10days">10 kunlik</button>
                <button class="tab-btn" data-range="15days">15 kunlik</button>
        </div>

<!-- Bashorat kartalari shu yerda paydo bo‘ladi -->
<div id="forecastPanel" class="forecast-panel"></div>
            <!-- Yuklanmoqda -->
            <div id="loading" class="loading">
                <i class="fas fa-spinner fa-spin"></i> Yuklanmoqda...
            </div>

            <!-- Ob-havo ma'lumotlari -->
            <div id="weatherInfo" class="weather-info">
                <div class="location">
                    <h2 id="cityName"></h2>
                    <p id="date"></p>
                </div>
                
                <div class="weather-main">
                    <div class="temperature">
                        <img id="weatherIcon" src="" alt="Ob-havo holati" />
                        <span id="temp"></span>
                    </div>
                    <div class="description">
                        <p id="weatherDesc"></p>
                        <p id="feelsLike"></p>
                    </div>
                </div>

                <div class="weather-details">
                    <div class="detail-card">
                        <i class="fas fa-eye"></i>
                        <div>
                            <p>Ko‘rinib turishi</p>
                            <span id="visibility"></span>
                        </div>
                    </div>
                    <div class="detail-card">
                        <i class="fas fa-tint"></i>
                        <div>
                            <p>Namlik</p>
                            <span id="humidity"></span>
                        </div>
                    </div>
                    <div class="detail-card">
                        <i class="fas fa-wind"></i>
                        <div>
                            <p>Shamol tezligi</p>
                            <span id="windSpeed"></span>
                        </div>
                    </div>
                    <div class="detail-card">
                        <i class="fas fa-thermometer-half"></i>
                        <div>
                            <p>Bosim</p>
                            <span id="pressure"></span>
                        </div>
                    </div>
                </div>

                <div class="sun-times">
                    <div class="sun-time">
                        <i class="fas fa-sun"></i>
                        <span id="sunrise"></span>
                    </div>
                    <div class="sun-time">
                        <i class="fas fa-moon"></i>
                        <span id="sunset"></span>
                    </div>
                </div>
            </div>

            <!-- Xato xabari -->
            <div id="error" class="error">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="errorText"></span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
